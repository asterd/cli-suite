name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Rust stable (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check alias targets
        run: cargo check --workspace --all-features

      - name: Smoke test aliases
        shell: bash
        run: |
          cargo build --workspace --all-features
          suffix=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            suffix=".exe"
          fi
          for bin in \
            axt-peek peek \
            axt-run run \
            axt-doc doc \
            axt-drift drift \
            axt-port port \
            axt-test test
          do
            "target/debug/$bin$suffix" --version
          done

      - name: Run tests
        run: cargo test --workspace

      - name: Check docs artifacts
        shell: bash
        run: |
          test -f docs/man/axt-peek.1
          test -f docs/man/axt-run.1
          test -f docs/man/axt-doc.1
          test -f docs/man/axt-drift.1
          test -f docs/man/axt-port.1
          test -f docs/man/axt-test.1
          test -f docs/skills/axt-suite/SKILL.md

  security:
    name: Security checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit
        run: cargo audit

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo-deny advisories
        run: cargo deny check advisories
